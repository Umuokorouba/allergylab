name: AllergyLab CI/CD

on:
    push:
        branches:
          - main

jobs:
    build-and-push:
      runs-on: ubuntu-latest


          steps:
              - name: Checkout repository
                uses: actions/checkout@v4

               - name: Log in to Docker Hub
               uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build App Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/allergylab-app:latest ./Part8/app

  - name: Build DB Loader Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/allergylab-db-loader:latest ./Part8/db-loader

  - name: Build Email Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/allergylab-email:latest ./Part8/email

  - name: Push App Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/allergylab-app:latest

  - name: Push DB Loader Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/allergylab-db-loader:latest

  - name: Push Email Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/allergylab-email:latest

 